services:
  # Database (Supabase alternative using PostgreSQL)
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agronavis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      # Database connection
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agronavis
      # Supabase (using external service)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      # JWT Secret
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      # ML Service URL (running separately on host machine)
      ML_SERVICE_URL: http://host.docker.internal:8001
    depends_on:
      postgres:
        condition: service_healthy
    # Using production build for Docker - no volumes needed
    # volumes:
    #   - ./backend:/app
    #   - /app/node_modules
    # command: npm run dev

  # ML Service (running separately on localhost:8001)
  # Uncomment below if you want to run ML service in Docker:
  # ml-service:
  #   build:
  #     context: .
  #     dockerfile: ./backend/ml-service/Dockerfile
  #   restart: unless-stopped
  #   ports:
  #     - "8001:8001"
  #   environment:
  #     PYTHONUNBUFFERED: 1
  #     MODEL_PATH: /app/models

  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Backend API
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Supabase
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      # Weather API
      NEXT_PUBLIC_WEATHER_API_KEY: ${WEATHER_API_KEY}
      # App URL
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - backend
    # Using production build for Docker - no volumes needed
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules
    #   - /app/.next

  # Redis (for caching - optional)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    driver: bridge