<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AgroNavis — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0d2137 0%, #0a3d2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f0fdf4;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 360px;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(16, 185, 129, 0.15);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 40px;
      height: 40px;
      stroke: #10b981;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f0fdf4;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #6ee7b7;
      margin-bottom: 24px;
    }

    .tips {
      text-align: left;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .tips h2 {
      font-size: 14px;
      font-weight: 600;
      color: #6ee7b7;
      margin-bottom: 8px;
    }

    .tips ul {
      list-style: none;
      padding: 0;
    }

    .tips li {
      font-size: 13px;
      color: #a7f3d0;
      padding: 6px 0;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .tips li::before {
      content: "•";
      color: #10b981;
      font-weight: bold;
    }

    button {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>

    <h1>You're Offline</h1>
    <p>
      No internet connection detected. AgroNavis works offline for viewing cached data,
      but you need to reconnect for new features.
    </p>

    <div class="tips">
      <h2>While you're offline, you can:</h2>
      <ul>
        <li>View your previously loaded farms</li>
        <li>See cached field maps</li>
        <li>Review past crop scan history</li>
      </ul>
    </div>

    <button onclick="window.location.reload()">
      Try Again
    </button>
  </div>

  <script>
    // Automatically redirect back to app when online
    window.addEventListener('online', () => {
      window.location.href = '/';
    });
  </script>
</body>
</html>
